services:

  # ============================================================
  # Product Service + eigene Datenbank
  # ============================================================
  product-service:
    build: ./microservices/product-service
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@product-db:5432/product_db
      PORT: 3001
    depends_on:
      product-db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  product-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: product_db
    volumes:
      - product_data:/var/lib/postgresql/data
      - ./microservices/product-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ============================================================
  # Cart Service + eigene Datenbank
  # ============================================================
  cart-service:
    build: ./microservices/cart-service
    ports:
      - "3002:3002"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@cart-db:5432/cart_db
      PORT: 3002
      PRODUCT_SERVICE_URL: http://product-service:3001
    depends_on:
      cart-db:
        condition: service_healthy
      product-service:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  cart-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cart_db
    volumes:
      - cart_data:/var/lib/postgresql/data
      - ./microservices/cart-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # ============================================================
  # Order Service + eigene Datenbank
  # ============================================================
  order-service:
    build: ./microservices/order-service
    ports:
      - "3003:3003"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@order-db:5432/order_db
      PORT: 3003
      PRODUCT_SERVICE_URL: http://product-service:3001
      CART_SERVICE_URL: http://cart-service:3002
    depends_on:
      order-db:
        condition: service_healthy
      product-service:
        condition: service_started
      cart-service:
        condition: service_started
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  order-db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: order_db
    volumes:
      - order_data:/var/lib/postgresql/data
      - ./microservices/order-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

volumes:
  product_data:
  cart_data:
  order_data:
