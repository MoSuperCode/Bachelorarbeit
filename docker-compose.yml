services:
  # --- Node.js Monolith Application ---
  app:
    build: ./monolith
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ecommerce
      PORT: 3000
    depends_on:
      db:
        condition: service_healthy  # Warte bis DB wirklich bereit ist
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  # --- PostgreSQL Datenbank ---
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./monolith/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

volumes:
  postgres_data:
